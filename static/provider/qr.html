<!doctype html>
<html>
  <head>
    <title>Connexion par QR Code</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background-color: #f9fafb;
      }
      #qrcode {
        margin-top: 20px;
        padding: 20px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      h1 {
        color: #111827;
      }
      p {
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <h1>Connexion par QR Code</h1>
    <p>Scannez ce QR Code avec votre application mobile pour vous connecter.</p>
    <canvas id="qrcode"></canvas>
    <script>
      // Affiche le QR Code contenant l'URL de validation
      QRCode.toCanvas(
        document.getElementById("qrcode"),
        "{{qrUrl}}",
        { width: 250 },
        function (error) {
          if (error) console.error(error);
        },
      );

      // Ouvre une WebSocket vers le Durable Object pour attendre le signal de succès
      const ws = new WebSocket("{{wsUrl}}");
      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.location) {
          // 4. Finalisation (Côté PC)
          // Le script JS reçoit l'URL de redirection (qui contient le code et le state)
          // et redirige l'utilisateur vers la callback_url d'origine pour terminer le flux PKCE.
          window.location.href = data.location;
        } else if (data.error) {
          alert("Erreur: " + data.error);
        }
      };
      ws.onclose = () => {
        console.log("WebSocket fermée. Le handshake a peut-être expiré.");
      };
    </script>
  </body>
</html>
